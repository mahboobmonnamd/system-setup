# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # true colour support

set -g prefix C-b          # keep default Ctrl+b prefix
set -g mouse on            # mouse support (click pane, scroll, resize)
set -g base-index 1        # windows start at 1 (easier keyboard reach)
set -g pane-base-index 1   # panes start at 1
set -g renumber-windows on # re-number windows when one is closed
set -g history-limit 50000 # large scrollback buffer
set -g escape-time 0       # no delay after Escape (important for nvim)
set -g focus-events on     # pass focus events to apps (nvim autoread)
set -g status-interval 5   # refresh status bar every 5 seconds

# ── Window / pane splits (use | and - for intuitive splits) ───────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"   # new window in same directory
unbind '"'
unbind %

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ── Vim-style pane navigation (works with vim-tmux-navigator) ─────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vim keybindings) ───────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ── Plugins (managed by TPM) ──────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

# ── Catppuccin Latte (light) theme ────────────────────────────────────────────
set -g @catppuccin_flavour 'latte'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_status_modules_right "directory session date_time"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{pane_current_path}"

# ── tmux-resurrect: persist sessions across reboots ───────────────────────────
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'  # restore nvim sessions too

# ── tmux-continuum: auto-save every 15 min, auto-restore on start ─────────────
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── vim-tmux-navigator: seamless Ctrl+h/j/k/l across nvim and tmux ───────────
set -g @vim_navigator_mapping_left   "C-h"
set -g @vim_navigator_mapping_down   "C-j"
set -g @vim_navigator_mapping_up     "C-k"
set -g @vim_navigator_mapping_right  "C-l"

# ── Initialize TPM (keep this line at the very bottom) ────────────────────────
run '~/.config/tmux/plugins/tpm/tpm'
